apiVersion: v1
kind: Secret
metadata:
  name: ttrpg-discord-app
  namespace: ttrpg
  labels:
    app.kubernetes.io/name: ttrpg-discord-app
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
# Secret values are managed out-of-band via kubectl.
# To set values:
#   kubectl -n ttrpg create secret generic ttrpg-discord-app \
#     --from-literal=DISCORD_TOKEN="your-token" \
#     --from-literal=DISCORD_CLIENT_ID="your-client-id" \
#     --dry-run=client -o yaml | kubectl apply -f -
