apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttrpg-discord-app
  namespace: ttrpg
  labels:
    app.kubernetes.io/name: ttrpg-discord-app
spec:
  replicas: 1 # Discord bots should only run a single replica
  strategy:
    type: Recreate # Avoid two instances racing on the same bot token
  selector:
    matchLabels:
      app.kubernetes.io/name: ttrpg-discord-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ttrpg-discord-app
    spec:
      containers:
        - name: bot
          image: ghcr.io/m-gora/ttrpg-discord-app:0.0.0 # updated by CI on each release
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: ttrpg-discord-app
          env:
            - name: SESSIONS_FILE
              value: /data/sessions.json
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ttrpg-discord-app-data
