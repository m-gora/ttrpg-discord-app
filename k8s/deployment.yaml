apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttrpg-discord-app
  namespace: ttrpg
  labels:
    app.kubernetes.io/name: ttrpg-discord-app
spec:
  replicas: 1 # Discord bots should only run a single replica
  strategy:
    type: Recreate # Avoid two instances racing on the same bot token
  selector:
    matchLabels:
      app.kubernetes.io/name: ttrpg-discord-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ttrpg-discord-app
    spec:
      automountServiceAccountToken: false
      containers:
        - name: bot
          image: ghcr.io/m-gora/ttrpg-discord-app:1.1.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: ttrpg-discord-app
            - configMapRef:
                name: ttrpg-discord-app-conf
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 128Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ttrpg-discord-app-data
